<!DOCTYPE html>
<html lang="ru">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <title>Freelance Platform</title>

    <style>
        input,
        select {
            border-radius: 12px !important;
            padding: 10px !important;
            border: 1px solid #ddd !important;
        }

        input:focus {
            border-color: #ffc107 !important;
            box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, .25) !important;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="/">
                Freelance Platform
            </a>
            <div class="d-flex align-items-center">

                {% if user.is_authenticated %}

                <a class="btn btn-outline-light me-2" href="/users/dashboard/">
                    Кабинет
                </a>
                <form action="/users/logout/" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger">
                        Выйти
                    </button>
                </form>

                <a class="btn btn-warning me-2" href="/orders/">
                    Заказы
                </a>

                {% else %}

                <a class="btn btn-outline-light me-2" href="/users/login/">
                    Вход
                </a>

                <a class="btn btn-warning" href="/users/register/">
                    Регистрация
                </a>

                {% endif %}

            </div>

        </div>
    </nav>

    <div class="container mt-5">

        {% block content %}
        {% endblock %}

    </div>
    <footer class="bg-dark text-light mt-5 py-4">

        <div class="container text-center">

            <h5>Freelance Platform</h5>

            <p>
                Платформа для начинающих фрилансеров
            </p>

            <small>
                © 2026 Freelance Platform
            </small>

        </div>

    </footer>

</body>

</html>
