
{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="bg-dark text-white p-5 text-center">

                    <h1 class="fw-bold mb-3">
                        Добро пожаловать на FREElance 🚀
                    </h1>

                    <p class="mb-0 fs-5 text-light">
                        Давайте настроим ваш профиль и начнем работу
                    </p>

                </div>

                <!-- FORM -->
                <div class="p-5">

                    <form method="post">

                        {% csrf_token %}

                        <!-- ROLE -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Кто вы?
                            </label>

                            <select name="role" class="form-select form-select-lg rounded-3">
                                <option value="freelancer">Фрилансер</option>
                                <option value="client">Заказчик</option>
                            </select>

                        </div>

                        <!-- ABOUT -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Расскажите о себе
                            </label>

                            <textarea
                                name="bio"
                                rows="5"
                                class="form-control rounded-3"
                                placeholder="Например: Я занимаюсь веб-дизайном и разработкой сайтов..."
                            ></textarea>

                        </div>

                        <!-- SKILLS -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Навыки
                            </label>

                            <input
                                type="text"
                                name="skills"
                                class="form-control rounded-3"
                                placeholder="Python, Django, Design, UI/UX..."
                            >

                        </div>

                        <!-- PRICE -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Желаемый заработок
                            </label>

                            <input
                                type="number"
                                name="price"
                                class="form-control rounded-3"
                                placeholder="Например: 5000"
                            >

                        </div>

                        <!-- BUTTON -->
                        <div class="d-grid mt-5">

                            <button class="btn btn-dark btn-lg rounded-3 py-3">
                                Сохранить профиль ✨
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
